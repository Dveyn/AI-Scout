<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — {{ company_brand }} Scout</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page" style="max-width:420px;margin:4rem auto">
    <div class="card card--pad-lg">
      <h1 style="margin:0 0 0.35rem;font-size:1.35rem">{{ company_brand }} Scout</h1>
      <p class="muted" style="margin:0 0 1.25rem">Доступ только для авторизованных пользователей</p>
      {% if error %}
      <div class="banner-error" style="margin-bottom:1rem">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="field">
          <span class="field__label">Логин</span>
          <input type="text" name="username" required autocomplete="username" autofocus>
        </div>
        <div class="field">
          <span class="field__label">Пароль</span>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--block">Войти</button>
      </form>
    </div>
  </main>
</body>
</html>
